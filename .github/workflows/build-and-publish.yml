name: Build and Publish NuGet Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # Allow manual trigger

# Release path only — triggered by a v* tag (what publish.sh pushes) or manual dispatch.
# Push/PR quality + tests live in code-quality.yml. Keeping the write/publish permissions and
# NuGet credentials out of the push/PR path is intentional (fork PRs never get them).
permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Get all history for version calculation
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x
          9.0.x
          10.0.x
        
    - name: Determine Version
      id: version
      run: |
        if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
          # Extract version from tag (refs/tags/v2.1.0 -> 2.1.0)
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "📦 Release version: $VERSION"
        else
          # Get latest tag and use as base for dev version
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          BASE_VERSION=${LATEST_TAG#v}
          VERSION="${BASE_VERSION}-dev.${{ github.run_number }}"
          echo "🔧 Dev version: $VERSION (based on ${LATEST_TAG})"
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Display Version
      run: |
        echo "Package Version: ${{ steps.version.outputs.version }}"
        
    - name: Restore dependencies
      run: dotnet restore SharpConsoleUI/SharpConsoleUI.csproj

    # Code-quality gate before a release publishes to NuGet — blocks even if publish.sh is
    # bypassed and a tag is pushed manually. Mirrors the Code Quality workflow's blocking checks.
    - name: Code quality gate
      run: |
        if ! dotnet format SharpConsoleUI/SharpConsoleUI.csproj --verify-no-changes --verbosity diagnostic; then
          echo "::error::Code is not formatted (dotnet format would make changes)."
          exit 1
        fi
        missing=0
        while IFS= read -r f; do
          head -8 "$f" | grep -q "License: MIT" || { echo "::error file=$f::Missing license-header banner"; missing=$((missing+1)); }
        done < <(find SharpConsoleUI -name '*.cs' -not -path '*/bin/*' -not -path '*/obj/*')
        [ "$missing" -eq 0 ] || { echo "::error::$missing file(s) missing the header banner."; exit 1; }
        count=$(dotnet build SharpConsoleUI/SharpConsoleUI.csproj -c Release --no-restore --no-incremental 2>&1 | grep -cE "warning (CS|CA|IDE)" || true)
        [ "$count" -eq 0 ] || { echo "::error::Build produced $count code warning(s); release must be warning-clean."; exit 1; }
        echo "Code-quality gate passed: format clean, headers present, warning-clean build."

    - name: Test
      run: dotnet test SharpConsoleUI.Tests/SharpConsoleUI.Tests.csproj --configuration Release --verbosity normal

    - name: Build
      run: dotnet build SharpConsoleUI/SharpConsoleUI.csproj --configuration Release --no-restore /p:Version=${{ steps.version.outputs.version }}

    - name: Package
      run: dotnet pack SharpConsoleUI/SharpConsoleUI.csproj --configuration Release --no-build --output ./nupkgs /p:Version=${{ steps.version.outputs.version }}

    - name: Pack Templates
      run: dotnet pack templates/SharpConsoleUI.Templates.csproj --configuration Release --output ./nupkgs /p:Version=${{ steps.version.outputs.version }}

    - name: Pack schost Tool
      run: dotnet pack tools/schost/src/schost/schost.csproj --configuration Release --output ./nupkgs /p:Version=${{ steps.version.outputs.version }}

    - name: Generate Release Notes
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
      id: release_notes
      run: |
        # Get previous tag
        PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

        # Generate commit list
        if [ -n "$PREVIOUS_TAG" ]; then
          echo "### What's Changed" > release_notes.md
          echo "" >> release_notes.md
          git log ${PREVIOUS_TAG}..HEAD --pretty=format:"- %s (%h) — %an" --no-merges >> release_notes.md
          echo "" >> release_notes.md
          CONTRIBUTORS=$(git log ${PREVIOUS_TAG}..HEAD --no-merges --format='%an' \
            | grep -v '^Nikolaos Protopapas$' | sort -u)
          if [ -n "$CONTRIBUTORS" ]; then
            echo "" >> release_notes.md
            echo "### Contributors" >> release_notes.md
            echo "" >> release_notes.md
            echo "Thanks to our external contributors for this release:" >> release_notes.md
            echo "" >> release_notes.md
            echo "$CONTRIBUTORS" | sed 's/^/- /' >> release_notes.md
          fi
        else
          echo "### What's Changed" > release_notes.md
          echo "" >> release_notes.md
          echo "Initial release" >> release_notes.md
        fi

        echo "" >> release_notes.md
        echo "" >> release_notes.md
        if [ -n "$PREVIOUS_TAG" ]; then
          echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREVIOUS_TAG}...v${{ steps.version.outputs.version }}" >> release_notes.md
        fi

        # Set output
        {
          echo 'notes<<EOF'
          cat release_notes.md
          echo EOF
        } >> $GITHUB_OUTPUT

    - name: Create GitHub Release
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: ./nupkgs/*.nupkg
        body: |
          ## SharpConsoleUI ${{ steps.version.outputs.version }}

          **NuGet Package:** https://www.nuget.org/packages/SharpConsoleUI/${{ steps.version.outputs.version }}

          ### Installation
          ```bash
          dotnet add package SharpConsoleUI --version ${{ steps.version.outputs.version }}
          ```

          ### Project Templates
          ```bash
          dotnet new install SharpConsoleUI.Templates
          dotnet new tui-app -n MyApp
          ```

          ### Desktop Host Tool
          ```bash
          dotnet tool install --global SharpConsoleUI.Host
          schost init && schost run && schost pack
          ```

          ${{ steps.release_notes.outputs.notes }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: nuget-packages
        path: |
          ./nupkgs/*.nupkg
          ./nupkgs/*.snupkg
        
    - name: Publish to NuGet
      if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || github.event_name == 'workflow_dispatch'
      run: |
        dotnet nuget push ./nupkgs/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
        dotnet nuget push ./nupkgs/*.snupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
